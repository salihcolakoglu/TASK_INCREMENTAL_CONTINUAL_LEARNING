# Research Priorities
# ============================================================================
# CIFAR-100 is the best dataset for algorithm development because:
# 1. Clear differentiation between methods (EWC: 55.33%, SI: 47.75%, FT: 42.39%)
# 2. Significant room for improvement (55.33% << 100%)
# 3. High forgetting (15-22%), plenty of space to reduce
# 4. Realistic difficulty (not too easy like MNIST, not impossible)
#
# Target for new algorithms:
# - Match EWC's 55.33% accuracy
# - Match SI's 3.71% forgetting
# - Best of both worlds!
